<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>アニメ情報サイト</title>
    <style>
        body {
            font-family: "Arial", sans-serif;
            background-color: #f5f5f5;
            margin: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        ui {
            list-style: none;
            padding: 0;
        }

        li {
            background-color: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        a {
            text-decoration: none;
            font-weight: bold;
            color: #007bff;
        }

        a:hover {
            text-decoration: underline;
        }

        .delete-button {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .delete-button:hover {
            background-color: #b02a37;
        }

    </style>
</head>
<body>
    <h1>アニメ情報サイト</h1>

    <p><a href="/anime/new">＋ アニメを追加する</a></p>

    <ul>
        <li th:each="anime : ${animeList}">
            <h2>
                <a th:href="@{/anime/{id}(id=${anime.id})}" th:text="${anime.title}"></a>
            </h2>
            <p>ジャンル：<span th:text="${anime.genre}"></span></p>
            <p>評価：<span th:text="${anime.rating}"></span></p>

            <form th:action="@{/anime/{id}/delete(id=${anime.id})}" method="post">
                <button type="submit" onclick="return confirm('本当に削除しますか？')" class="delete-button">削除</button>
            </form>
        </li>
    </ul>
</body>
</html>
